<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabClaw — Sign In</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <img src="/asset/logo_rmbg.png" alt="TabClaw" />
      <h1>TabClaw</h1>
      <p class="auth-tagline">Table Intelligence Agent</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <form id="form-login" class="auth-form" onsubmit="return false">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="login-username" type="text" autocomplete="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-password" type="password" autocomplete="current-password" placeholder="Enter your password" />
      </div>
      <div id="login-error" class="auth-error hidden"></div>
      <button class="btn primary auth-submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="auth-form hidden" onsubmit="return false">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="reg-username" type="text" autocomplete="username" placeholder="Choose a username (min 3 chars)" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="reg-password" type="password" autocomplete="new-password" placeholder="Choose a password (min 6 chars)" />
      </div>
      <div id="reg-error" class="auth-error hidden"></div>
      <button class="btn primary auth-submit-btn" id="reg-btn" onclick="doRegister()">Create Account</button>
    </form>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideError(id) {
    document.getElementById(id).classList.add('hidden');
  }

  async function doLogin() {
    hideError('login-error');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showError('login-error', 'Please enter username and password.'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        showError('login-error', data.detail || 'Login failed.');
      }
    } catch (e) {
      showError('login-error', 'Network error.');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  async function doRegister() {
    hideError('reg-error');
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !password) { showError('reg-error', 'Please fill in all fields.'); return; }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        showError('reg-error', data.detail || 'Registration failed.');
      }
    } catch (e) {
      showError('reg-error', 'Network error.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginVisible = !document.getElementById('form-login').classList.contains('hidden');
      if (loginVisible) doLogin(); else doRegister();
    }
  });
</script>
</body>
</html>
